# ========================================
# JABR Publication Consultancy
# Netlify Configuration
# ========================================
# This file configures deployment, redirects, and headers on Netlify
# More info: https://docs.netlify.com/configure-builds/file-based-configuration/

# ========== BUILD CONFIGURATION ==========
[build]
  # Command to run before deploying
  command = "npm install"
  
  # Directory containing the content to deploy
  publish = "."
  
  # Node.js version
  environment = { NODE_VERSION = "18.0.0" }

# ========== FUNCTIONS CONFIGURATION ==========
# For serverless functions (Node.js backend on Netlify)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ========== HEADERS (Security & Performance) ==========

# Apply security headers to all responses
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    "X-Frame-Options" = "DENY"
    "X-Content-Type-Options" = "nosniff"
    "X-XSS-Protection" = "1; mode=block"
    "Referrer-Policy" = "strict-origin-when-cross-origin"
    "Permissions-Policy" = "geolocation=(), microphone=(), camera=(), usb=(), payment=(), vr=(), xr=()"
    "Strict-Transport-Security" = "max-age=31536000; includeSubDomains; preload"
    
    # CORS Headers (restrict to your domain)
    "Access-Control-Allow-Origin" = "https://jabrpublication.com"
    
    # Content Security Policy
    "Content-Security-Policy" = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https: blob:; media-src 'self' https:; connect-src 'self' https: ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# HTML files: prevent caching
[[headers]]
  for = "/*.html"
  [headers.values]
    "Cache-Control" = "public, max-age=3600"
    "Content-Type" = "text/html; charset=utf-8"

# CSS files: long-term caching
[[headers]]
  for = "/style.css"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"
    "Content-Type" = "text/css"

# JavaScript files: long-term caching
[[headers]]
  for = "/script.js"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"
    "Content-Type" = "application/javascript"

# Image files: long-term caching
[[headers]]
  for = "/images/*"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"

# Logo file: long-term caching
[[headers]]
  for = "/logo.jpeg"
  [headers.values]
    "Cache-Control" = "public, max-age=31536000, immutable"

# API responses: no caching
[[headers]]
  for = "/api/*"
  [headers.values]
    "Cache-Control" = "no-store, no-cache, must-revalidate, proxy-revalidate"
    "Pragma" = "no-cache"
    "Expires" = "0"

# ========== REDIRECTS ==========

# Redirect www to non-www (optional, customize for your domain)
[[redirects]]
  from = "https://www.jabrpublication.com/*"
  to = "https://jabrpublication.com/:splat"
  status = 301
  force = true

# SPA fallback: serve index.html for all non-matching routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirect HTTP to HTTPS (handled automatically by Netlify)
[[redirects]]
  from = "http://jabrpublication.com/*"
  to = "https://jabrpublication.com/:splat"
  status = 301
  force = true

# ========== CONTEXT-SPECIFIC CONFIGURATION ==========

# Production environment
[context.production]
  environment = { NODE_ENV = "production" }
  command = "npm install"

# Deploy preview (pull request previews)
[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

# Branch deploy
[context.branch-deploy]
  environment = { NODE_ENV = "staging" }

# ========== PLUGIN CONFIGURATION ==========

# Example: Netlify Essential Plugins
[[plugins]]
  package = "@netlify/plugin-shortcut"
  [plugins.inputs]
    template = "PR: {title}"

# ========== MONITORING & LOGGING ==========

[dev]
  # Local dev settings
  command = "node server.js"
  port = 3000
  functions = "netlify/functions"
  autoLaunch = false
